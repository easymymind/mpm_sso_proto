version: v2

managed:
  enabled: true
  disable:
    - path: vendor.protobuf
    - path: buf/validate/validate.proto
    - module: buf.build/bufbuild/validate
  override:
    - file_option: go_package_prefix
      value: github.com/easymymind/mpm_sso_proto/pkg


plugins:
  - local: protoc-gen-go
    out: pkg
    opt:
      - paths=source_relative

  - local: protoc-gen-go-grpc
    out: pkg
    opt:
      - paths=source_relative

inputs:
  - directory: protobuf