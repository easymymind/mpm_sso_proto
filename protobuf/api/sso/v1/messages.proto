syntax = "proto3";

package github.easymymind.mpm_sso_proto.protobuf.api.sso.v1;

import "buf/validate/validate.proto";

option go_package = "pkg/api/v1/sso;ssov1";


message IsAdminRequest {
  int64 user_id = 1 [(buf.validate.field).int64.gt = 0];
}

message IsAdminResponse {
  bool is_admin = 1;
}

message RegisterRequest {
  string email = 1
  [
    json_name = "email",
    (buf.validate.field).string = {
      email: true,
      min_len: 3
      max_len: 256
    }
  ];
  string password = 2
  [
    json_name = "password",
    (buf.validate.field).string = {
      min_len: 3
      max_len: 56
    }
  ];
}

message RegisterResponse {
  int64 user_id = 1;
}

message LoginRequest {
  string email = 1
  [
    json_name = "email",
    (buf.validate.field).string = {
      email: true,
      min_len: 3
      max_len: 56
    }
  ];
  string password = 2
  [
    json_name = "password",
    (buf.validate.field).string = {
      min_len: 3
      max_len: 256
    }
  ];
  int32 app_id = 3 [
    json_name = "app_id",
    (buf.validate.field).int32 = { gte: 1, lte: 10 }
  ];
}

message LoginResponse {
  string token = 1;
}

message LogoutRequest {
  string token = 1;
}

message LogoutResponse {
  bool success = 1 [(buf.validate.field).string.min_len = 1];
}